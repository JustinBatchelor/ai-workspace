{{- if eq .Values.editor.type "devspace" }}
{{- $dwName := include "ai-workspace.devworkspaceName" . -}}
{{- $continueConfigName := include "ai-workspace.continueConfigName" . -}}
apiVersion: workspace.devfile.io/v1alpha2
kind: DevWorkspace
metadata:
  name: {{ $dwName }}
  labels:
    {{- include "ai-workspace.labels" . | nindent 4 }}
spec:
  started: true
  routingClass: che
  template:
    attributes:
      controller.devfile.io/storage-type: per-user
      pod-overrides:
        spec:
          volumes:
          - name: continue-config
            configMap:
              name: {{ $continueConfigName }}
              defaultMode: 420
    projects:
    - name: project
      git:
        remotes:
          origin: {{ .Values.gitRepo | quote }}
        checkoutFrom:
          revision: {{ .Values.gitBranch | quote }}
    components:
    - name: tools
      attributes:
        container-overrides:
          volumeMounts:
          - name: continue-config
            mountPath: /tmp/continue-config
            readOnly: true
      container:
        image: {{ .Values.devspaces.image }}
        memoryRequest: {{ .Values.devspaces.resources.requests.memory }}
        memoryLimit: {{ .Values.devspaces.resources.limits.memory }}
        cpuRequest: {{ .Values.devspaces.resources.requests.cpu | quote }}
        cpuLimit: {{ .Values.devspaces.resources.limits.cpu | quote }}
        mountSources: true
        sourceMapping: /projects
        env:
        - name: MODEL_ENDPOINT
          value: "http://{{ .Values.aiModel.name }}-predictor:8080"
        - name: MODEL_NAME
          value: {{ .Values.aiModel.name | quote }}
    {{- if .Values.continuedev.enabled }}
    commands:
    - id: setup-continue
      exec:
        component: tools
        commandLine: |
          set -e
          CONTINUE_DIR="${HOME}/.continue"
          mkdir -p "${CONTINUE_DIR}"
          cp /tmp/continue-config/config.yaml "${CONTINUE_DIR}/config.yaml"
          echo "Continue.dev config written to ${CONTINUE_DIR}/config.yaml"

          echo "Waiting for che-code to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3100/healthz > /dev/null 2>&1; then
              echo "che-code is ready."
              break
            fi
            sleep 2
          done

          RCLICMD=""
          for candidate in \
            /checode/checode-linux-libc/ubi9/bin/remote-cli/code-oss \
            /checode/checode-linux-libc/ubi8/bin/remote-cli/code-oss; do
            if [ -x "${candidate}" ]; then
              RCLICMD="${candidate}"
              break
            fi
          done

          if [ -n "${RCLICMD}" ]; then
            echo "Installing Continue.dev extension..."
            "${RCLICMD}" --install-extension Continue.continue 2>/dev/null || true
            echo "Continue.dev extension install attempted."
          else
            echo "code-oss CLI not found, skipping extension install."
          fi
    events:
      postStart:
      - setup-continue
    {{- end }}
  contributions:
  - name: editor
    uri: {{ .Values.devspaces.cheCodeEditorUri | quote }}
{{- end }}
